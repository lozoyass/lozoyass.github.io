# Configuración del Sitio
title: "Diario de robótica de Jorge Lozoya Astudillo"
description: "Bitácora de prácticas de robótica en Unibotics."
url: "https://lozoyass.github.io"
baseurl: ""

# Configuración del Tema (LIMPIO)
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# Ajustes de Compilación
markdown: kramdown
highlighter: rouge
paginate: 5
paginate_path: /page:num/
permalink: /:categories/:title/

include:
  - _pages

# PLUGINS (HE AÑADIDO EL REMOTE THEME AQUÍ, ES VITAL)
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Configuración del Autor
author:
  name: "Jorge Lozoya"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Ingeniero informático. Estudiante de visión artificial. Aquí publicaré mis avances en las prácticas de Unibotics."
  links: []

# Configuración del Footer
footer:
  links: []

# Valores por defecto para Posts y Páginas
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: "single"
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: "single"
      author_profile: true

# Archivos de categorías
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/